<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" />
    </filter>
  </defs>
  
  <!-- Outer glowing ring -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="url(#glow)" stroke-width="6" filter="url(#blur)" opacity="0.8" />
  
  <!-- Solid ring -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="url(#glow)" stroke-width="4" />
  
  <!-- Center letter -->
  <text x="50" y="69" font-family="'Instrument Serif', Georgia, serif" font-size="64" font-weight="400" fill="url(#glow)" text-anchor="middle" font-style="italic">S</text>
  <text x="50" y="69" font-family="'Instrument Serif', Georgia, serif" font-size="64" font-weight="400" fill="white" text-anchor="middle" font-style="italic" opacity="0.9">S</text>
</svg>
